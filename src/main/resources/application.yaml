spring:
  application:
    name: finanzas-personales
  datasource:
    url: jdbc:postgresql://localhost:5433/finanzas_db
    username: finanzas_user
    password: finanzas_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: finanzas
  flyway:
    enabled: false
    locations: classpath:db/migration
    schemas: finanzas
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:MiClaveSecretaSuperSeguraParaJWT2024CodeFactory}
    expiration: 3600000
    refresh-expiration: 86400000
  security:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.codefactory.finanzas: DEBUG